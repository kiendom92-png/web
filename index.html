<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Trang web của tôi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        .message.error {
            background-color: #fee;
            color: #c33;
            display: block;
        }

        .message.success {
            background-color: #efe;
            color: #3c3;
            display: block;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>🔐 Đăng Nhập</h2>
        
        <div class="input-group">
            <label>📧 Email hoặc Tên đăng nhập</label>
            <input type="text" id="username" placeholder="Nhập email hoặc tài khoản">
        </div>

        <div class="input-group">
            <label>🔒 Mật khẩu</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu">
        </div>

        <button onclick="handleLogin()">Đăng Nhập</button>

        <div id="messageBox" class="message"></div>

        <div class="register-link">
            Chưa có tài khoản? <a href="#">Đăng ký ngay</a>
        </div>
    </div>

    <script>
        function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageBox = document.getElementById('messageBox');

            // Kiểm tra đơn giản (bạn có thể sửa lại tài khoản mật khẩu tùy ý)
            if (username === "admin" && password === "123456") {
                messageBox.className = "message success";
                messageBox.innerHTML = "✅ Đăng nhập thành công! Đang chuyển hướng...";
                
                // Sau 1.5 giây, chuyển sang trang chào mừng (có thể thay bằng link của bạn)
                setTimeout(() => {
                    window.location.href = "welcome.html";
                }, 1500);
            } else {
                messageBox.className = "message error";
                messageBox.innerHTML = "❌ Sai tài khoản hoặc mật khẩu! Vui lòng thử lại.";
                
                // Xóa thông báo sau 3 giây
                setTimeout(() => {
                    messageBox.className = "message";
                    messageBox.innerHTML = "";
                }, 3000);
            }
        }

        // Thêm sự kiện nhấn Enter để đăng nhập nhanh
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
    </script>
</body>
</html>
